services:
  - type: web
    name: arimare-backend
    runtime: node
    plan: free
    buildCommand: npm ci --omit=dev
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: ANTHROPIC_API_KEY
        sync: false   # Set manually in Render dashboard
